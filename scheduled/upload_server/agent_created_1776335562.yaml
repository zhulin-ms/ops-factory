version: "1.0.0"
title: "Windows Gateway 自动部署任务"
description: "每天凌晨3点自动克隆代码、编译Gateway项目、编译Webapp项目、验证文件并上传到服务器的自动化部署任务"
instructions: |
  执行以下步骤完成Gateway和Webapp项目的自动化部署：
  
  1. 克隆/更新代码仓库
     - 检查目录 C:\zhulin\ops-factory 是否存在
     - 如果存在，执行 git pull origin main
     - 如果不存在，执行 git clone https://github.com/your-org/ops-factory.git C:\zhulin\ops-factory
  
  2. 编译 gateway 项目
     - 进入目录 C:\zhulin\ops-factory\gateway
     - 执行 Maven 编译命令: mvn clean package -DskipTests
     - 检查编译是否成功(errorlevel 为0表示成功)
  
  3. 编译 webapp 项目
     - 进入目录 C:\zhulin\ops-factory\webapp
     - 执行 npm 编译命令: npm run build
     - 检查编译是否成功(errorlevel 为0表示成功)
  
  4. 准备 gateway-service 文件
     - 验证文件是否存在: C:\zhulin\ops-factory\gateway\gateway-service\target\gateway-service.jar
     - 如果文件不存在，任务失败并退出
  
  5. 准备 gateway-common 文件
     - 验证文件是否存在: C:\zhulin\ops-factory\gateway\gateway-common\target\gateway-common-1.0.0-SNAPSHOT.jar
     - 如果文件不存在，任务失败并退出
  
  6. 执行文件上传脚本
     - 执行脚本: C:\zhulin\goose\upload-opsfactory.bat
     - 该脚本使用 PuTTY 工具将编译好的 jar 文件上传到服务器
     - 检查脚本执行是否成功
  
  环境要求：
  - Java: JDK 21.0.10 (C:\Program Files\Java\jdk-21.0.10)
  - Maven: 3.9.14 (C:\zhulin\apache-maven-3.9.14)
  - Node.js: 确保已安装 npm
  - 工作目录: C:\deployment
  - MAVEN_OPTS: -Xmx2g -Xms1g
