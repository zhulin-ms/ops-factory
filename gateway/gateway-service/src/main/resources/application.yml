server:
  port: 3000
  address: 0.0.0.0

gateway:
  secret-key: test
  cors-origin: http://127.0.0.1:5173
  goosed-bin: goosed
  goose-tls: true

  paths:
    project-root: ..
    agents-dir: agents
    users-dir: users

  idle:
    timeout-minutes: 15
    check-interval-ms: 60000

  upload:
    max-file-size-mb: 50
    max-image-size-mb: 20

  limits:
    max-instances-per-user: 20
    max-instances-global: 50

  sse:
    first-byte-timeout-sec: 120
    idle-timeout-sec: 600
    max-duration-sec: 1200

  prewarm:
    enabled: true
    default-agent-id: universal-agent

  langfuse:
    host: ""
    public-key: ""
    secret-key: ""

  office-preview:
    enabled: true
    onlyoffice-url: ""
    file-base-url: ""

  logging:
    access-log-enabled: true
    include-upstream-error-body: false
    include-sse-chunk-preview: false
    sse-chunk-preview-max-chars: 160

spring:
  config:
    import: optional:file:${GATEWAY_CONFIG_PATH:config.yaml}
  codec:
    max-in-memory-size: 50MB
  webflux:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

logging:
  config: classpath:log4j2-spring.xml
