# Gateway Configuration
# This file defines agents and gateway-level settings

# Office file preview via OnlyOffice Document Server (CE)
# Requires: docker run -d --name onlyoffice -p 8080:80 onlyoffice/documentserver
# For local dev, startup.sh will copy gateway/config/onlyoffice.local.json into the container
# to allow private host access (host.docker.internal) and disable JWT checks.
officePreview:
  enabled: true
  onlyofficeUrl: "http://localhost:8080"          # Browser loads OnlyOffice JS API from here
  fileBaseUrl: "http://host.docker.internal:3000"  # OnlyOffice container fetches files from gateway via this URL

agents:
  - id: universal-agent
    name: "Universal Agent"
    port: 3001

  - id: kb-agent
    name: "KB Agent"
    port: 3002

  - id: report-agent
    name: "Report Agent"
    port: 3003

  - id: contract-agent
    name: "Contract Agent"
    port: 3004
