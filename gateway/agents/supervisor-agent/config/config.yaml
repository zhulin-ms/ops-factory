GOOSE_PROVIDER: openai
GOOSE_MODEL: qwen/qwen3.5-35b-a3b
OPENAI_HOST: https://openrouter.ai/api
GOOSE_MODE: auto
GOOSE_DISABLE_KEYRING: '1'
GOOSE_TELEMETRY_ENABLED: true
GOOSE_CONTEXT_LIMIT: '65536'
GOOSE_MAX_TOKENS: '4096'
GOOSE_TEMPERATURE: '0.2'
GOOSE_CONTEXT_STRATEGY: summarize
GOOSE_AUTO_COMPACT_THRESHOLD: '0.8'
GOOSE_MAX_TURNS: '50'
vision:
  mode: passthrough
  provider: openai
  model: qwen/qwen3.5-35b-a3b
  baseUrl: https://openrouter.ai/api
LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-opsfactory
LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-opsfactory
LANGFUSE_URL: http://localhost:3100
extensions:
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  developer:
    enabled: false
    type: builtin
    name: developer
    description: General development tools useful for software engineering.
    display_name: Developer
    timeout: 300
    bundled: true
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: General computer control tools that don't require you to be a developer or engineer.
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualization and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  memory:
    enabled: false
    type: builtin
    name: memory
    description: Teach goose your preferences as you go.
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  summon:
    enabled: false
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  tom:
    enabled: false
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  platform-monitor:
    enabled: true
    type: stdio
    name: platform-monitor
    description: OpsFactory platform monitoring — provides health, agent, and observability data
    cmd: npx
    args:
    - tsx
    - config/mcp/platform-monitor/src/index.ts
    envs:
      GATEWAY_URL: http://127.0.0.1:3000
    env_keys:
    - GATEWAY_SECRET_KEY
    timeout: 60
    bundled: null
    available_tools: []
