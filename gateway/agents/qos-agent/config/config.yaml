GOOSE_PROVIDER: custom_op-qwen3.5-35b-a3b
GOOSE_MODEL: qwen/Qwen3.5-35B-A3B
GOOSE_MODE: auto
GOOSE_DISABLE_KEYRING: '1'
GOOSE_TELEMETRY_ENABLED: false
GOOSE_CONTEXT_LIMIT: '65536'
GOOSE_MAX_TOKENS: '4096'
GOOSE_TEMPERATURE: '0.2'
GOOSE_CONTEXT_STRATEGY: summarize
GOOSE_AUTO_COMPACT_THRESHOLD: '0.8'
GOOSE_MAX_TURNS: '50'
extensions:
  extensionmanager:
    enabled: false
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  developer:
    enabled: false
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: General computer control tools that don't require you to be a developer or engineer.
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualization and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  memory:
    enabled: false
    type: builtin
    name: memory
    description: Teach goose your preferences as you go.
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
