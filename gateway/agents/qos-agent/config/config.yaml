    bundled: true
    available_tools: []
  skills:
    enabled: true
    type: platform
    name: skills
    description: Load and use skills from relevant directories
    display_name: Skills
    bundled: true
    available_tools: []
  sop-executor:
    enabled: true
    type: stdio
    name: sop-executor
    description: ''
    cmd: node
    args:
    - D:/ss/code/ops-factory-main/ops-factory-main/gateway/agents/qos-agent/config/mcp/sop-executor/dist/index.js
    envs:
      GATEWAY_URL: http://127.0.0.1:3000
      GATEWAY_SECRET_KEY: test
    env_keys: []
    timeout: null
    bundled: null
    available_tools: []
