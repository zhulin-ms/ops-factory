GOOSE_PROVIDER: custom_qwen3.5-27b
GOOSE_MODEL: qwen/qwen3.5-27b
GOOSE_MODE: auto
GOOSE_DISABLE_KEYRING: '1'
GOOSE_TELEMETRY_ENABLED: false
GOOSE_CONTEXT_LIMIT: '65536'
GOOSE_MAX_TOKENS: '4096'
GOOSE_TEMPERATURE: '0.2'
GOOSE_CONTEXT_STRATEGY: summarize
GOOSE_AUTO_COMPACT_THRESHOLD: '0.8'
GOOSE_MAX_TURNS: '50'
extensions:
  extensionmanager:
    enabled: false
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  todo:
    enabled: true
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  developer:
    enabled: false
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  computercontroller:
    enabled: true
    type: builtin
    name: computercontroller
    description: General computer control tools that don't require you to be a developer or engineer.
    display_name: Computer Controller
    timeout: 300
    bundled: true
    available_tools: []
  autovisualiser:
    enabled: false
    type: builtin
    name: autovisualiser
    description: Data visualization and UI generation tools
    display_name: Auto Visualiser
    timeout: 300
    bundled: true
    available_tools: []
  memory:
    enabled: true
    type: builtin
    name: memory
    description: Teach goose your preferences as you go.
    display_name: Memory
    timeout: 300
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  summon:
    enabled: true
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  tom:
    enabled: false
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  analyze:
    enabled: false
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  sop-executor:
    enabled: true
    type: stdio
    name: sop-executor
    description: SOP workflow executor - list/run SOPs, query hosts, execute remote commands
    cmd: node
    args:
    - config/mcp/sop-executor/dist/index.js
    envs:
      GATEWAY_URL: http://127.0.0.1:3000
      OUTPUT_DIR: ./output
      GATEWAY_SECRET_KEY: test
    env_keys: []
    timeout: 300
    bundled: null
    available_tools: []
  browser-use:
    enabled: false
    type: stdio
    name: browser-use
    description: Browser automation via browser-use official MCP - navigate, click, type, extract, screenshot, tabs and more
    cmd: python
    args:
    - -m
    - browser_use.mcp.server
    envs: {}
    env_keys: []
    timeout: 120
    bundled: null
    available_tools: []
  system-health-analysis:
    enabled: true
    type: stdio
    name: system-health-analysis
    description: QoS system health analysis MCP - query health score, alarms, topology, and sub-topology
    cmd: node
    args:
    - config/mcp/system-health-analysis/dist/index.js
    envs:
    env_keys:
    - QOS_BASE_URL
    - QOS_USERNAME
    - QOS_PASSWORD
    - GATEWAY_API_PASSWORD
    timeout: 60
    bundled: null
    available_tools: []
  orchestrator:
    enabled: false
    type: platform
    name: orchestrator
    description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
    display_name: Orchestrator
    bundled: true
    available_tools: []
  summarize:
    enabled: false
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
  skills:
    enabled: false
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true
    available_tools: []
