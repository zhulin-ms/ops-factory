port: 3000
host: "0.0.0.0"
secretKey: "test"
corsOrigin: "*"
goosedBin: "goosed"

paths:
  agentsDir: agents
  usersDir: users

idle:
  timeoutMinutes: 15
  checkIntervalMs: 60000

upload:
  maxFileSizeMb: 50
  maxImageSizeMb: 20

limits:
  maxInstancesPerUser: 5
  maxInstancesGlobal: 50

prewarm:
  enabled: true
  defaultAgentId: universal-agent

langfuse:
  host: "http://127.0.0.1:3100"
  publicKey: "pk-lf-opsfactory"
  secretKey: "sk-lf-opsfactory"

officePreview:
  enabled: true
  onlyofficeUrl: "http://127.0.0.1:8080"
  fileBaseUrl: "http://host.docker.internal:3000"

agents:
  - {id: universal-agent, name: Universal Agent}
  - {id: kb-agent, name: KB Agent}
  - {id: report-agent, name: Report Agent}
  - {id: supervisor-agent, name: Supervisor Agent, sysOnly: true}
