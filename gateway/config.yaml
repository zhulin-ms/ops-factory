server:
  port: 3000
  address: 0.0.0.0
  ssl:
    enabled: false
    key-store: file:.gateway-keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12

gateway:
  secret-key: test
  cors-origin: '*'
  goosed-bin: goosed
  goose-tls: true
  paths:
    project-root: ..
    agents-dir: agents
    users-dir: users
  idle:
    timeout-minutes: 15
    check-interval-ms: 60000
  sse:
    first-byte-timeout-sec: 120
    idle-timeout-sec: 300
    max-duration-sec: 600
  upload:
    max-file-size-mb: 50
    max-image-size-mb: 20
  limits:
    max-instances-per-user: 20
    max-instances-global: 200
  prewarm:
    enabled: true
    default-agent-id: universal-agent
  office-preview:
    enabled: true
    onlyoffice-url: 'http://127.0.0.1:8080'
    file-base-url: 'http://host.docker.internal:3000'
  credential-encryption-key: 'changeit-changeit-changeit-32ch'
  remote-execution:
    default-timeout: 30
    max-timeout: 120
  logging:
    access-log-enabled: true
    include-upstream-error-body: false
    include-sse-chunk-preview: false
    sse-chunk-preview-max-chars: 160

logging:
  level:
    root: INFO
    com.huawei.opsfactory.gateway: INFO
    org.springframework: WARN
    reactor: WARN
    io.netty: WARN
residentInstances:
  enabled: true
  entries:
    - {userId: admin, agentIds: ['*']}
    - {userId: robby, agentIds: ['*']}
agents:
- {id: universal-agent, name: Universal Agent}
- {id: kb-agent, name: KB Agent}
- {id: supervisor-agent, name: Supervisor Agent}
- {id: qos-agent, name: QoS Agent}
- {id: qa-agent, name: QA Agent}
- {id: qa-cli-agent, name: QA CLI Agent}
