port: 3000
host: 0.0.0.0
secretKey: test
corsOrigin: '*'
goosedBin: goosed
goosedTls: true
gooseTls: true
gatewayTls: false
gatewayKeyStore: .gateway-keystore.p12
gatewayKeyStorePassword: changeit
paths: {agentsDir: agents, usersDir: users}
idle: {timeoutMinutes: 15, checkIntervalMs: 60000}
sse: {firstByteTimeoutSec: 120, idleTimeoutSec: 300, maxDurationSec: 600}
upload: {maxFileSizeMb: 50, maxImageSizeMb: 20}
limits: {maxInstancesPerUser: 20, maxInstancesGlobal: 200}
prewarm: {enabled: true, defaultAgentId: universal-agent}
residentInstances:
  enabled: true
  entries:
    - {userId: admin, agentIds: ['*']}
    - {userId: robby, agentIds: ['*']}
officePreview: {enabled: true, onlyofficeUrl: 'http://127.0.0.1:8080', fileBaseUrl: 'http://host.docker.internal:3000'}
credentialEncryptionKey: 'changeit-changeit-changeit-32ch'
remoteExecution: {defaultTimeout: 30, maxTimeout: 120}
agents:
- {id: universal-agent, name: Universal Agent}
- {id: kb-agent, name: KB Agent}
- {id: report-agent, name: Report Agent}
- {id: supervisor-agent, name: Supervisor Agent}
- {id: qos-agent, name: QoS Agent}
- {id: qa-agent, name: QA Agent}
