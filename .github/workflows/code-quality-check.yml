name: Code Quality Check

# 触发条件
on:
  # 定时执行 - 每天 UTC 18:00 (北京时间 02:00)
  schedule:
    - cron: '0 18 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '执行模式'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
      modules:
        description: '指定模块（逗号分隔）'
        required: false
        default: 'all'
        type: string
      
  # Pull Request 时触发
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
  
  # Push 到主分支时触发
  push:
    branches: [ main ]

# 环境变量
env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.4'

jobs:
  # Job 1: 快速检查（类型检查 + 单元测试）
  quick-check:
    name: Quick Check (Type + Unit Tests)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'quick'
    
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            web-app/package-lock.json
            typescript-sdk/package-lock.json
            test/package-lock.json
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: |
            gateway/pom.xml
            knowledge-service/pom.xml
            prometheus-exporter/pom.xml
      
      - name: Verify environment
        run: |
          echo "=== Environment Info ==="
          node --version
          npm --version
          java -version
          mvn --version
      
      - name: Install TypeScript dependencies
        run: |
          echo "=== Installing dependencies ==="
          cd web-app && npm ci
          cd ../typescript-sdk && npm ci
          cd ../test && npm ci
      
      - name: TypeScript type check (web-app)
        run: |
          echo "=== Type checking web-app ==="
          cd web-app
          npx tsc --noEmit
      
      - name: TypeScript type check (typescript-sdk)
        run: |
          echo "=== Type checking typescript-sdk ==="
          cd typescript-sdk
          npx tsc --noEmit
      
      - name: TypeScript type check (test)
        run: |
          echo "=== Type checking test ==="
          cd test
          npx tsc --noEmit
      
      - name: Unit tests (web-app)
        run: |
          echo "=== Running web-app unit tests ==="
          cd web-app
          npm run test:basic
      
      - name: Unit tests (typescript-sdk)
        run: |
          echo "=== Running typescript-sdk unit tests ==="
          cd typescript-sdk
          npm run test:basic
      
      - name: Unit tests (gateway)
        run: |
          echo "=== Running gateway unit tests ==="
          cd gateway
          mvn test -DskipITs=true
      
      - name: Unit tests (knowledge-service)
        run: |
          echo "=== Running knowledge-service unit tests ==="
          cd knowledge-service
          mvn test -DskipITs=true
      
      - name: Unit tests (prometheus-exporter)
        run: |
          echo "=== Running prometheus-exporter unit tests ==="
          cd prometheus-exporter
          mvn test -DskipITs=true
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-quick-${{ github.run_number }}
          path: |
            **/target/surefire-reports/*.xml
            web-app/coverage/
            typescript-sdk/coverage/
          retention-days: 7

  # Job 2: 完整检查（包括构建）
  full-check:
    name: Full Check (including Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push' || inputs.mode == 'full'
    
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      
      - name: Install dependencies
        run: |
          cd web-app && npm ci
          cd ../typescript-sdk && npm ci
          cd ../test && npm ci
      
      - name: Build typescript-sdk
        run: |
          echo "=== Building typescript-sdk ==="
          cd typescript-sdk
          npm run build
      
      - name: Build web-app
        run: |
          echo "=== Building web-app ==="
          cd web-app
          npm run build
      
      - name: Build gateway
        run: |
          echo "=== Building gateway ==="
          cd gateway
          mvn clean package -DskipTests
      
      - name: Build knowledge-service
        run: |
          echo "=== Building knowledge-service ==="
          cd knowledge-service
          mvn clean package -DskipTests
      
      - name: Build prometheus-exporter
        run: |
          echo "=== Building prometheus-exporter ==="
          cd prometheus-exporter
          mvn clean package -DskipTests
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            gateway/target/*.jar
            knowledge-service/target/*.jar
            prometheus-exporter/target/*.jar
            web-app/dist/
            typescript-sdk/dist/
          retention-days: 7

  # Job 3: 集成测试（E2E）
  integration-test:
    name: Integration Tests (E2E)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'
    
    timeout-minutes: 45
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: opsfactory_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      
      - name: Install test dependencies
        run: |
          cd test
          npm ci
          npx playwright install --with-deps
      
      - name: Start gateway
        run: |
          cd gateway
          mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=8080" &
          echo "Waiting for gateway to start..."
          sleep 30
      
      - name: Start web-app
        run: |
          cd web-app
          npm run dev &
          echo "Waiting for web-app to start..."
          sleep 15
      
      - name: Run E2E tests
        run: |
          cd test
          npm run test:e2e
        env:
          GATEWAY_URL: http://localhost:3000
          WEBAPP_URL: http://localhost:5173
      
      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-${{ github.run_number }}
          path: |
            test/playwright-report/
            test/test-results/
          retention-days: 7

  # Job 4: 生成汇总报告
  summary:
    name: Generate Summary Report
    runs-on: ubuntu-latest
    needs: [quick-check, full-check, integration-test]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Generate summary
        run: |
          echo "# Code Quality Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Quick check result
          if [ "${{ needs.quick-check.result }}" == "success" ]; then
            echo "✅ Quick Check: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Quick Check: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Full check result
          if [ "${{ needs.full-check.result }}" == "success" ]; then
            echo "✅ Full Check: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.full-check.result }}" == "skipped" ]; then
            echo "⏭️ Full Check: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Full Check: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Integration test result
          if [ "${{ needs.integration-test.result }}" == "success" ]; then
            echo "✅ Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.integration-test.result }}" == "skipped" ]; then
            echo "⏭️ Integration Tests: SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test reports: Available for 7 days" >> $GITHUB_STEP_SUMMARY
          echo "- Build artifacts: Available for 7 days" >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `### Code Quality Check Results
            
            | Check | Status |
            |-------|--------|
            | Quick Check | ${{ needs.quick-check.result == 'success' ? '✅ PASSED' : '❌ FAILED' }} |
            | Full Check | ${{ needs.full-check.result == 'success' ? '✅ PASSED' : needs.full-check.result == 'skipped' ? '⏭️ SKIPPED' : '❌ FAILED' }} |
            | Integration Tests | ${{ needs.integration-test.result == 'success' ? '✅ PASSED' : needs.integration-test.result == 'skipped' ? '⏭️ SKIPPED' : '❌ FAILED' }} |
            
            [View details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
