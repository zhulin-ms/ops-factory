name: PR Code Quality Check

# Pull Request 时触发
on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
    paths:
      - 'web-app/**'
      - 'typescript-sdk/**'
      - 'gateway/**'
      - 'knowledge-service/**'
      - 'prometheus-exporter/**'
      - 'test/**'

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'

jobs:
  # 快速检查 - 适用于 PR
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Detect changes
        id: changes
        run: |
          echo "=== Detecting changed files ==="
          
          # TypeScript modules
          if git diff --name-only origin/main...HEAD | grep -q "^web-app/"; then
            echo "webapp=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only origin/main...HEAD | grep -q "^typescript-sdk/"; then
            echo "sdk=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only origin/main...HEAD | grep -q "^test/"; then
            echo "test=true" >> $GITHUB_OUTPUT
          fi
          
          # Java modules
          if git diff --name-only origin/main...HEAD | grep -q "^gateway/"; then
            echo "gateway=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only origin/main...HEAD | grep -q "^knowledge-service/"; then
            echo "knowledge=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only origin/main...HEAD | grep -q "^prometheus-exporter/"; then
            echo "exporter=true" >> $GITHUB_OUTPUT
          fi
          
          echo "Changed modules: webapp=${{ steps.changes.outputs.webapp }}, sdk=${{ steps.changes.outputs.sdk }}, gateway=${{ steps.changes.outputs.gateway }}"
      
      # TypeScript 类型检查
      - name: Type check web-app
        if: steps.changes.outputs.webapp == 'true'
        run: |
          echo "=== Type checking web-app ==="
          cd web-app
          npx tsc --noEmit
      
      - name: Type check typescript-sdk
        if: steps.changes.outputs.sdk == 'true'
        run: |
          echo "=== Type checking typescript-sdk ==="
          cd typescript-sdk
          npx tsc --noEmit
      
      - name: Type check test
        if: steps.changes.outputs.test == 'true'
        run: |
          echo "=== Type checking test ==="
          cd test
          npx tsc --noEmit
      
      # 单元测试
      - name: Unit tests web-app
        if: steps.changes.outputs.webapp == 'true'
        run: |
          echo "=== Running web-app unit tests ==="
          cd web-app
          npm run test:basic
      
      - name: Unit tests typescript-sdk
        if: steps.changes.outputs.sdk == 'true'
        run: |
          echo "=== Running typescript-sdk unit tests ==="
          cd typescript-sdk
          npm run test:basic
      
      - name: Unit tests gateway
        if: steps.changes.outputs.gateway == 'true'
        run: |
          echo "=== Running gateway unit tests ==="
          cd gateway
          mvn test -DskipITs=true
      
      - name: Unit tests knowledge-service
        if: steps.changes.outputs.knowledge == 'true'
        run: |
          echo "=== Running knowledge-service unit tests ==="
          cd knowledge-service
          mvn test -DskipITs=true
      
      - name: Unit tests prometheus-exporter
        if: steps.changes.outputs.exporter == 'true'
        run: |
          echo "=== Running prometheus-exporter unit tests ==="
          cd prometheus-exporter
          mvn test -DskipITs=true
      
      - name: Generate summary
        if: always()
        run: |
          echo "# PR Code Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changed Modules" >> $GITHUB_STEP_SUMMARY
          echo "- webapp: ${{ steps.changes.outputs.webapp == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
          echo "- typescript-sdk: ${{ steps.changes.outputs.sdk == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
          echo "- test: ${{ steps.changes.outputs.test == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
          echo "- gateway: ${{ steps.changes.outputs.gateway == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
          echo "- knowledge-service: ${{ steps.changes.outputs.knowledge == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
          echo "- prometheus-exporter: ${{ steps.changes.outputs.exporter == 'true' && '✅ Changed' || '➖ No change' }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `### 🔍 Code Quality Check Results
            
            #### Changed Modules Checked:
            | Module | Status |
            |--------|--------|
            | webapp | ${{ steps.changes.outputs.webapp == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            | typescript-sdk | ${{ steps.changes.outputs.sdk == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            | test | ${{ steps.changes.outputs.test == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            | gateway | ${{ steps.changes.outputs.gateway == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            | knowledge-service | ${{ steps.changes.outputs.knowledge == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            | prometheus-exporter | ${{ steps.changes.outputs.exporter == 'true' && '✅ Checked' || '➖ Skipped (no changes)' }} |
            
            ---
            📊 [View detailed results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
