name: Scheduled Code Quality Check

# 定时执行 - 每天 UTC 2:00 (北京时间 10:00) 和 UTC 18:00 (北京时间 02:00)
on:
  schedule:
    - cron: '0 2 * * *'   # 上午检查
    - cron: '0 18 * * *'  # 下午检查
  
  # 手动触发
  workflow_dispatch:
    inputs:
      check_type:
        description: '检查类型'
        required: true
        default: 'full'
        type: choice
        options:
          - quick
          - full
          - build-only

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Run code quality check
        run: |
          chmod +x ./scripts/code-quality-check.sh
          
          if [ "${{ inputs.check_type }}" == "quick" ]; then
            ./scripts/code-quality-check.sh --quick --parallel
          elif [ "${{ inputs.check_type }}" == "build-only" ]; then
            ./scripts/code-quality-check.sh --phases build --parallel
          else
            ./scripts/code-quality-check.sh --parallel
          fi
      
      - name: Generate report
        if: always()
        run: |
          echo "# Code Quality Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 检查日志文件
          if [ -f /tmp/code-check-*.log ]; then
            echo "## Check Results" >> $GITHUB_STEP_SUMMARY
            for log in /tmp/code-check-*.log; do
              if [ -f "$log" ]; then
                echo "### $(basename $log)" >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                    tail -50 "$log" >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-check-logs-${{ github.run_number }}
          path: /tmp/code-check-*.log
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Code Quality Check Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Code Quality Check Failed
              
              **Workflow**: ${{ github.workflow }}
              **Run**: ${{ github.run_number }}
              **Commit**: ${{ github.sha }}
              **Branch**: ${{ github.ref_name }}
              
              Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
              `,
              labels: ['bug', 'quality-check']
            });
